<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management Application</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        .card {
            border: 1px solid black;
        }

        output {
            font-size: 0.8em;
        }
    </style>
    <script src="script-array-practice.js" defer></script>
    <script src="script-ems.js" defer></script>
</head>
<body>

    <header id="main-header" class="bg-dark text-white p-4 mb-3">
        <div class="container-fluid">
            <h1 class="header-title">The Employee Management Application</h1>
        </div>
    </header>

    <div class="container-fluid">
        <div class="row">

            <!-- Add Employee Form -->
            <div class="col-lg-4 col-md-12 mb-4">
                <div class="card card-body">
                    <h2 class="title mb-4">Add Employee</h2>

                    <form id="addForm">

                        <label for="id">4-Digit Employee ID</label>
                        <input type="text"
                               maxlength="8"
                               required
                               id="id"
                               class="form-control">

                        <br>

                        <label for="name">Full Name</label>
                        <input type="text"
                               required
                               id="name"
                               class="form-control">

                        <br>

                        <label for="extension">4-Digit Extension</label>
                        <input type="text"
                               maxlength="4"
                               required
                               id="extension"
                               class="form-control">

                        <br>

                        <label for="email">Email</label>
                        <input type="email"
                               required
                               id="email"
                               class="form-control">

                        <br>

                        <label for="department">Department</label>
                        <select id="department"
                                required
                                class="form-control">
                            <option value="Administrative">Administrative</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Executive">Executive</option>
                            <option value="Marketing">Marketing</option>
                            <option value="QA">Quality Assurance</option>
                            <option value="Sales">Sales</option>
                        </select>

                        <br>

                        <input type="submit"
                               class="btn btn-dark"
                               value="Add Employee">

                    </form>
                </div>
            </div>

            <!-- Employee Grid -->
            <div class="col-lg-8 col-md-12">
                <div class="card card-body">
                    <h2 class="title mb-4">
                        Employees
                        <small>
                            (<output id="empCount">0</output>)
                        </small>
                    </h2>

                    <table id="employees" class="table table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Ext</th>
                                <th>Email</th>
                                <th>Department</th>
                                <th>&nbsp;</th>
                            </tr>
                        </thead>

                        <tbody>
                            <!-- Employee rows added dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
